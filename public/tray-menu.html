<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mineradio Tray Menu</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
      background: transparent;
      --text: #27313f;
      --muted: #748195;
      --line: #e7edf4;
      --blue: #5e748e;
      --hot: #ff5a78;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      overflow: hidden;
      padding: 6px;
      user-select: none;
    }
    .tray-menu-card {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
      border: 1px solid rgba(166, 177, 191, .36);
      border-radius: 16px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 18px 48px rgba(18, 32, 48, .22), 0 2px 8px rgba(18, 32, 48, .12);
      color: var(--text);
    }
    .track {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 5px 3px 11px;
      border-bottom: 1px solid var(--line);
    }
    .cover {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #eff6ff, #dfe8f4);
      border: 1px solid rgba(99, 115, 132, .18);
      background-size: cover;
      background-position: center;
    }
    .title, .artist {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      line-height: 20px;
    }
    .artist {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
    }
    button {
      height: 34px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--blue);
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: #f0f4f8; }
    button:disabled {
      opacity: .42;
      cursor: default;
    }
    .play {
      background: #eef4fa;
      color: #34465a;
      font-weight: 800;
    }
    .liked { color: var(--hot); }
    .items { min-height: 0; padding-top: 8px; overflow-y: auto; scrollbar-width: thin; }
    .item, .mode {
      width: 100%;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) 16px;
      align-items: center;
      gap: 8px;
      height: 34px;
      padding: 0 8px;
      border-radius: 10px;
      color: var(--text);
      text-align: left;
      font-size: 13px;
    }
    .item .icon, .mode .icon {
      color: var(--blue);
      text-align: center;
      font-size: 14px;
    }
    .item .chev, .mode .chev {
      color: #9aa7b8;
      text-align: right;
    }
    .item.active .chev, .mode.active .chev { color: var(--hot); }
    .mode-panel {
      margin: 4px 0 6px 28px;
      padding: 4px;
      border-left: 1px solid var(--line);
    }
    .mode {
      grid-template-columns: 20px minmax(0, 1fr) 16px;
      height: 30px;
      color: var(--muted);
    }
    .separator {
      height: 1px;
      margin: 8px 0;
      background: var(--line);
    }
    .tray-footer { flex: 0 0 auto; padding-top: 2px; }
  </style>
</head>
<body>
  <main class="tray-menu-card" role="menu">
    <section class="track" aria-live="polite">
      <div id="cover" class="cover"></div>
      <div>
        <div id="title" class="title">Mineradio</div>
        <div id="artist" class="artist">沉浸此刻，也替你接住下一首</div>
      </div>
    </section>
    <section class="controls" aria-label="播放控制">
      <button id="prev" data-command="prev" title="上一首">⏮</button>
      <button id="play" class="play" data-command="togglePlay" title="播放/暂停">▶</button>
      <button id="next" data-command="next" title="下一首">⏭</button>
      <button id="like" data-command="toggleLike" title="喜欢">♡</button>
    </section>
    <section class="items">
      <button class="item" type="button" data-command="noop" aria-disabled="true">
        <span class="icon">↻</span><span>播放模式</span><span id="mode-label" class="chev">顺序</span>
      </button>
      <div class="mode-panel">
        <button class="mode" type="button" data-command="setPlayMode" data-mode="loop">
          <span class="icon">↻</span><span>顺序循环</span><span class="chev">✓</span>
        </button>
        <button class="mode" type="button" data-command="setPlayMode" data-mode="shuffle">
          <span class="icon">⇄</span><span>随机播放</span><span class="chev">✓</span>
        </button>
        <button class="mode" type="button" data-command="setPlayMode" data-mode="single">
          <span class="icon">①</span><span>单曲循环</span><span class="chev">✓</span>
        </button>
      </div>
      <button class="item" type="button" data-command="showMain">
        <span class="icon">▣</span><span>完整模式</span><span class="chev">›</span>
      </button>
      <button id="wallpaper" class="item" type="button" data-command="toggleWallpaper">
        <span class="icon">▧</span><span>开启音乐桌面</span><span class="chev">›</span>
      </button>
      <button id="lyrics" class="item" type="button" data-command="toggleDesktopLyrics">
        <span class="icon">词</span><span>打开桌面歌词</span><span class="chev">›</span>
      </button>
      <button class="item" type="button" data-command="settings">
        <span class="icon">⚙</span><span>设置</span><span class="chev">›</span>
      </button>
    </section>
    <footer class="tray-footer">
      <div class="separator"></div>
      <button class="item" type="button" data-command="quit">
        <span class="icon">⏻</span><span>退出</span><span class="chev"></span>
      </button>
    </footer>
  </main>
  <script>
    (function() {
      'use strict';
      var ipcRenderer = window.require ? window.require('electron').ipcRenderer : null;
      var state = {};
      window.trayMenu = {
        command: function(command, payload) {
          if (!ipcRenderer || !command || command === 'noop') return Promise.resolve({ ok: false });
          return ipcRenderer.invoke('mineradio-tray-menu-command', Object.assign({ command: command }, payload || {}));
        },
        onState: function(callback) {
          if (!ipcRenderer || typeof callback !== 'function') return function(){};
          var listener = function(_event, payload) { callback(payload || {}); };
          ipcRenderer.on('mineradio-tray-menu-state', listener);
          return function() { ipcRenderer.removeListener('mineradio-tray-menu-state', listener); };
        }
      };
      var modeText = { loop: '顺序', shuffle: '随机', single: '单曲' };
      function setText(id, text) {
        var el = document.getElementById(id);
        if (el) el.textContent = text;
      }
      function render(next) {
        state = Object.assign({}, state, next || {});
        setText('title', state.title || 'Mineradio');
        setText('artist', state.artist || 'Music Soul');
        setText('play', state.playing ? 'Ⅱ' : '▶');
        setText('like', state.liked ? '♥' : '♡');
        setText('mode-label', modeText[state.playMode] || '顺序');
        var cover = document.getElementById('cover');
        if (cover) cover.style.backgroundImage = state.cover ? 'url("' + String(state.cover).replace(/"/g, '%22') + '")' : '';
        ['prev', 'next', 'like'].forEach(function(id) {
          var btn = document.getElementById(id);
          if (btn) btn.disabled = !state.hasTrack;
        });
        var like = document.getElementById('like');
        if (like) like.classList.toggle('liked', !!state.liked);
        var wallpaper = document.getElementById('wallpaper');
        if (wallpaper) wallpaper.classList.toggle('active', !!state.wallpaperMode);
        var lyrics = document.getElementById('lyrics');
        if (lyrics) lyrics.classList.toggle('active', !!state.desktopLyrics);
        document.querySelectorAll('.mode').forEach(function(node) {
          node.classList.toggle('active', node.getAttribute('data-mode') === state.playMode);
        });
      }
      document.addEventListener('click', function(event) {
        var button = event.target && event.target.closest ? event.target.closest('[data-command]') : null;
        if (!button || button.disabled) return;
        var command = button.getAttribute('data-command');
        var payload = {};
        if (command === 'setPlayMode') payload.mode = button.getAttribute('data-mode') || 'loop';
        window.trayMenu.command(command, payload).catch(function(){});
      });
      window.trayMenu.onState(render);
      render(state);
    })();
  </script>
</body>
</html>
